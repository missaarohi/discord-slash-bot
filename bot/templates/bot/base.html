<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Discord Bot Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --border: #2a2e3a; --text: #e7e9ee;
      --muted: #8b90a0; --accent: #5865F2; --good: #3ba55d; --bad: #ed4245; --warn: #faa61a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    nav a { color: var(--text); text-decoration: none; font-weight: 600; }
    nav .links a { color: var(--muted); margin-left: 18px; font-weight: 500; font-size: 14px; }
    nav .links form { display: inline; margin-left: 18px; }
    nav .links form button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; font-weight: 500; padding: 0; font-family: inherit;
    }
    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .muted { color: var(--muted); font-size: 14px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge.processed { background: rgba(59,165,93,.15); color: var(--good); }
    .badge.failed { background: rgba(237,66,69,.15); color: var(--bad); }
    .badge.received { background: rgba(250,166,26,.15); color: var(--warn); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
    input[type=text], input[type=password], select, textarea {
      width: 100%; padding: 9px 10px; background: #0d0f15; border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; font-size: 14px;
    }
    button, .btn {
      background: var(--accent); color: white; border: none; padding: 9px 16px;
      border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block;
    }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .checkbox-row input { width: auto; }
    .error { color: var(--bad); margin-bottom: 12px; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'dashboard' %}">Discord Bot Dashboard</a>
    <div class="links">
      {% if user.is_authenticated %}
        <span class="muted">{{ user.username }}</span>
        <a href="{% url 'connect_server' %}">Connect server</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
      {% endif %}
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
